version: '3.8'

services:
  backend:
    build: ./backend
    container_name: waterpark-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Optional: Set CORS for frontend domain
      # - CORS_ORIGIN=http://frontend:5173
    volumes:
      # Mount datasets (read-only)
      - ./backend/datasets:/app/datasets:ro
    restart: unless-stopped
    networks:
      - waterpark-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/crowd"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./waterpark-frontend
    container_name: waterpark-frontend
    ports:
      - "5173:5173"
    environment:
      # Tell frontend where to find the backend API
      - VITE_API_BASE_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - waterpark-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  waterpark-network:
    driver: bridge
