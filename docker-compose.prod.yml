version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waterpark-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY?Missing OPENROUTER_API_KEY environment variable}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    expose:
      - "5000"
    volumes:
      - ./backend/datasets:/app/datasets:ro
    restart: always
    networks:
      - waterpark-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./waterpark-frontend
      dockerfile: Dockerfile
    container_name: waterpark-frontend
    environment:
      - VITE_API_BASE_URL=/api
    expose:
      - "5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - waterpark-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: waterpark-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # For SSL (uncomment when you have certificates)
      # - /etc/letsencrypt/live/yourdomain.com/fullchain.pem:/etc/nginx/ssl/cert.pem:ro
      # - /etc/letsencrypt/live/yourdomain.com/privkey.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - waterpark-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  waterpark-network:
    driver: bridge
